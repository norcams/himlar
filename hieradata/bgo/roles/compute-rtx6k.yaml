---
# NVIDIA SR-IOV-based vGPU hosts need SR-IOV enabled and mdevs created
include:
  kickstart:
    - profile::openstack::compute::pci_passthrough
    #- profile::openstack::compute::nvidia_vgpu_createmdev
  default:
    - nova::compute::mdev
    - profile::application::create_mig
    - profile::openstack::compute::pci_passthrough
    #- profile::openstack::compute::nvidia_vgpu_createmdev

## I think the creation of mdev gpu devices are is nowdays handeld by the nvidia-vgpud and nvidia-vgpu-mmgr services

profile::base::network::nm_network_auto_bonding:
  trp:
    eth0:
      ethernet:
        'mtu': '9000' # the MTU size must be set also on the slave interfaces
    eth1:
      ethernet:
        'mtu': '9000'

#FIXME:el9 move to common after all computes are el9 with zed
openstack_version: "zed"
named_interfaces::config:
  mgmt:
  - p1p1
  trp:
  - bond0
  live:
  - bond0.120


## Sensu 
sensu::agent::subscriptions:
  - 'base'
  - 'metrics'
  - 'compute'
  - 'physical'

#profile::base::physical::enable_l40s_pci_check:  true

# Enable extra yum repo vGPU drivers
profile::base::yumrepo::repo_hash:
  nrec-nonfree:
    ensure: present



## Custom Sensu checks FIXME:sensu-go
# profile::monitoring::sensu::agent::checks:
#   'num-gpus-check':
#     command:      "/usr/local/bin/check_number_of_gpus.sh"
#     interval:     60
#     subscribers:  ['checks']
#   'metrics-nvidia':
#     type:         'metric'
#     command:      'metrics-nvidia.rb --scheme nvidia.%{::hostname}'
#     interval:     60
#     subscribers:  ['metrics']
#     handlers:     ['graphite_tcp']

profile::base::lvm::physical_volume:
  '/dev/disk/by-id/wwn-0x600062b21246e680317dd4b927d60a98-part4':
    ensure: present
    force:  true
  '/dev/disk/by-id/wwn-0x600062b21246e680317dd4a509f949d3':
    ensure: present
    force:  true
profile::base::lvm::volume_group:
  'vg_instances':
    followsymlinks: true
    physical_volumes:
      - /dev/disk/by-id/wwn-0x600062b21246e680317dd4a509f949d3
  'vg_ext':
    followsymlinks: true
    physical_volumes:
      - /dev/disk/by-id/wwn-0x600062b21246e680317dd4b927d60a98-part4
profile::base::lvm::logical_volume:
  'lv_instances':
    volume_group: 'vg_instances'
    fs_type:      "xfs"
    mountpath:    "/var/lib/nova/instances"


profile::base::common::packages:
  'wget': {}
  'kernel-devel': {}
  'kernel-headers': {}
  'unzip': {}
#  'NVIDIA-vGPU-rhel': { ## FIXME: There is currently no RPM for EL9.8, use run file for now
#    source: 'http://repo.mgmt.bgo.uhdc.no/NVIDIA-vGPU-rhel-7.8-450.55.x86_64.rpm'
#  }

## GPU ##

profile::base::physical::blacklist_drv: true
profile::base::physical::blacklist_drv_list:
  'nouveau': {}

# NVIDIA SR-IOV-based vGPU hosts need sriov-manage at boot before mdev creation
#profile::openstack::compute::nvidia_vgpu_createmdev::enable: true
profile::base::selinux::semodules:
  sriov_manage:
    avc_file:   'sriov_manage.avc'

# NVIDIA RTX PRO 6000 Blackwell x4
#
# From "mdevctl types":
  # nvidia-1573                                                                                                                                
  #   Available instances: 0                                                                                                                   
  #   Device API: vfio-pci                                                                                                                     
  #   Name: NVIDIA RTX Pro 6000 Blackwell DC-2-48Q                                                                                             
  #   Description: num_heads=4, frl_config=60, framebuffer=49152M, max_resolution=7680x4320, max_instance=2


# NVIDIA newer generation cards need SR-IOV
#profile::openstack::compute::pci_passthrough::configure_amd_iommu: true

# Configuration values for the "create-mdev" service
#profile::application::create_mdev::enable:          true
#profile::application::create_mdev::nvidia_gpu_type: 'nvidia-1573'
#profile::application::create_mdev::trait:           'CUSTOM_NREC_VGPU_RTX6K_48G'

# Two equal 48 GB slices per GPU 
profile::application::create_mig::mig_default_layout: '2g.48gb,2g.48gb,2g.48gb,2g.48gb'
profile::application::create_mig::enable_sriov: true

# Optional, per physical GPU index:
# profile::application::mig::mig_gpu_overrides:
#   0: '2g.48gb,1g.24gb'

# Only on hosts with no tenants you mind disrupting (see Safety):
# profile::application::mig::apply_live: false


# Max 8 instances with default MIG setup
nova::scheduler::filter::max_instances_per_host: '8'

nova::compute::mdev::enabled_mdev_types:
  - 'nvidia-1573'

# nova::compute::mdev::mdev_types_device_addresses_mapping:
#   'nvidia-478':
#     device_addresses:
#       - '0000:b1:00.4'
#     max_instances: 1

## VIRT ## 

#yum_base_mirror:    'https://download.iaas.uio.no/uh-iaas/vgpu'

# remove when telemetry/ceilometer is up in all environments and move to common
profile::openstack::compute::manage_telemetry: true

profile::virtualization::nested::manage: false
profile::virtualization::nested::module: 'kvm-amd'

nova::compute::libvirt::cpu_mode:   'custom'
nova::compute::libvirt::cpu_models: ['EPYC-Genoa']

# These compute host uses local storage for instances
nova::compute::rbd::ephemeral_storage: false
nova::compute::libvirt::images_type: 'default'

# Configuration items not explicitly supported by the Puppet module
nova::config::nova_config:
  DEFAULT/metadata_workers:
    value: '4'
