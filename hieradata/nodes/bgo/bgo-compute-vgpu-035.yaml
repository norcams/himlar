---
profile::base::network::nm_network_auto_bonding:
  trp:
    p3p1:
      ethernet:
        'mtu': '9000' # the MTU size must be set also on the slave interfaces
    p3p2:
      ethernet:
        'mtu': '9000'

#FIXME:el9 move to common after all computes are el9 with zed
openstack_version: "zed"
named_interfaces::config:
  mgmt:
  - em3
  trp:
  - bond0
  live:
  - bond0.120


profile::base::lvm::physical_volume:
  '/dev/sda4':
    ensure: present
    force:  true
profile::base::lvm::volume_group:
  'vg_ext':
    physical_volumes:
      - /dev/sda4
profile::base::lvm::logical_volume:
  'lv_instances':
    volume_group: 'vg_ext'
    fs_type:      "xfs"
    mountpath:    "/var/lib/nova/instances"

# NVIDIA V100 16GB partitioned into 1x vGPUs, with CUDA support
#
# From "mdevctl types":
#
#  nvidia-109
#    Available instances: 0
#    Device API: vfio-pci
#    Name: GRID V100-16Q
#    Description: num_heads=4, frl_config=60, framebuffer=16384M, max_resolution=7680x4320, max_instance=1
#
# Example: 'nvidia-35' or ['nvidia-35', 'nvidia-36']
#
nova::compute::mdev::mdev_types: { 'nvidia-109', }

# Configuration values for the "create-mdev" service
profile::application::create_mdev::enable:                true
profile::application::create_mdev::nvidia_gpu_type:       'nvidia-109'
profile::application::create_mdev::max_instances_per_gpu: 1

nova::compute::libvirt::cpu_models: ['Cascadelake-Server-noTSX']
