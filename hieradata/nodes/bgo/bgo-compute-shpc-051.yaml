---
# this has no extra disk for instances and should only be used for shpc_ram1
profile::base::lvm::physical_volume:
  '/dev/sda4':
    ensure: present
    force:  true
profile::base::lvm::volume_group:
  'vg_ext':
    followsymlinks: true
    physical_volumes:
      - '/dev/sda4'
profile::base::lvm::logical_volume: # make sure we do not create lv_swap2
  'lv_instances':
    volume_group: 'vg_ext'
    fs_type:      "xfs"
    mountpath:    "/var/lib/nova/instances"

# We do not have a dedicated swap partition on this host
profile::base::common::extraswap:        true
profile::base::common::extraswap_sizegb: 30
