---
profile::base::network::nm_network_auto_bonding:
  trp:
    p2817p1:
      ethernet:
        'mtu': '9000' # the MTU size must be set also on the slave interfaces
    p2817p2:
      ethernet:
        'mtu': '9000'

#FIXME:el9 move to common after all computes are el9 with zed
openstack_version: "zed"
named_interfaces::config:
  mgmt:
  - p1793p1
  trp:
  - bond0
  live:
  - bond0.120




profile::base::lvm::physical_volume:
  '/dev/disk/by-id/wwn-0x600304802387e8f269d662623ed1df54-part4':
    ensure: present
    force:  true
  '/dev/disk/by-id/wwn-0x600304802387e8f269d6627154b777ba':
    ensure: present
    force:  true
profile::base::lvm::volume_group:
  'vg_instances':
    followsymlinks: true
    physical_volumes:
      - /dev/disk/by-id/wwn-0x600304802387e8f269d6627154b777ba
  'vg_ext':
    followsymlinks: true
    physical_volumes:
      - /dev/disk/by-id/wwn-0x600304802387e8f269d662623ed1df54-part4
profile::base::lvm::logical_volume:
  'lv_instances':
    volume_group: 'vg_instances'
    fs_type:      "xfs"
    mountpath:    "/var/lib/nova/instances"

## GPU ##

#profile::openstack::compute::pci_passthrough::configure_amd_iommu: true #This is set as default, we need profile code to manage this otherwise
profile::openstack::compute::pci_passthrough::manage_pcipassthrough: true
profile::openstack::compute::pci_passthrough::manage_pci_whitelist:  true
#profile::openstack::compute::pci_passthrough::report_in_placement:  false # New setting not in profile yet, maybe add it or maybe not. https://docs.openstack.org/nova/latest/configuration/config.html#pci.report_in_placement
profile::base::physical::enable_vfio_pci: true # To bind the gpus at boot to vfio_pci
profile::base::physical::vfio_pci_ids: '10de:233b' # The product id and gpu id e.g. nvidia:h200nvl
# 

# Nova overrides
nova::compute::libvirt::cpu_mode:   'custom'
nova::compute::libvirt::cpu_models: ['EPYC-Genoa']
nova::cpu_allocation_ratio:         '1'
nova::disk_allocation_ratio:        '1'
nova::ram_allocation_ratio:         '1'
# Nova PCI passthrough
nova::compute::pci::passthrough:
  - 'vendor_id':  '10de'
    'product_id': '233b'
nova::pci::aliases:
  - 'vendor_id':   '10de'
    'product_id':  '233b'
    'device_type': 'type-PCI'
    'name':        'h200nvl'

