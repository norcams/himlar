---
named_interfaces::config:
  mgmt:
  - p5p1
  trp:
  - bond0
  live:
  - bond0.120

profile::base::network::nm_network_auto_bonding:
  trp:
    p1p1:
      ethernet:
        'mtu': '9000' # the MTU size must be set also on the slave interfaces
    p1p2:
      ethernet:
        'mtu': '9000'

# we do not have any issues with disk order
profile::base::physical::load_ahci_first: false

profile::base::lvm::physical_volume:
  '/dev/sda':
    ensure: present
    force:  true
profile::base::lvm::volume_group:
  'vg_ext':
    physical_volumes:
      - /dev/sda
  'vg_swap':
    physical_volumes:
      - /dev/nvme0n1p4
