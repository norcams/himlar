---
profile::base::network::nm_network_auto_bonding:
  trp:
    p2817p1:
      ethernet:
        'mtu': '9000' # the MTU size must be set also on the slave interfaces
    p2817p2:
      ethernet:
        'mtu': '9000'

#FIXME:el9 move to common after all computes are el9 with zed
openstack_version: "zed"
named_interfaces::config:
  mgmt:
  - p1793p1
  trp:
  - bond0
  live:
  - bond0.120




profile::base::lvm::physical_volume:
  '/dev/disk/by-id/':
    ensure: present
    force:  true
  '/dev/disk/by-id/':
    ensure: present
    force:  true
profile::base::lvm::volume_group:
  'vg_instances':
    followsymlinks: true
    physical_volumes:
      - /dev/disk/by-id/
  'vg_ext':
    followsymlinks: true
    physical_volumes:
      - /dev/disk/by-id/
profile::base::lvm::logical_volume:
  'lv_instances':
    volume_group: 'vg_instances'
    fs_type:      "xfs"
    mountpath:    "/var/lib/nova/instances"

