---
profile::base::lvm::physical_volume:
  '/dev/sda':
    ensure: present
    force:  true
profile::base::lvm::volume_group:
  'vg_ext':
    physical_volumes:
      - /dev/sda
profile::base::lvm::logical_volume:
  'lv_instances':
    volume_group: 'vg_ext'
    fs_type:      "xfs"
    mountpath:    "/var/lib/nova/instances"

# This compute host uses local storage for instances
# nova::compute::rbd::ephemeral_storage:            false

# Turn on firewall logging for firewall debug
#profile::firewall::post::log: true

# make sure disks are configured correctly as the devices we want
profile::base::physical::load_ahci_last:    true
profile::base::physical::scsidrv:           'megaraid_sas'

#FIXME:el9 move to common after all computes are el9 with zed
openstack_version: "zed"
named_interfaces::config:
  mgmt:
  - em3
  trp:
  - bond0
  live:
  - bond0.120

#---------------------------------------------------------------------
# Configure to use modular libvirt
# (The old monolithic libvirt is deprecated)
#---------------------------------------------------------------------
profile::openstack::compute::hypervisor::modular_libvirt: true
nova::compute::libvirt::manage_libvirt_services:          false
nova::compute::libvirt::modular_libvirt:                  true
nova::compute::libvirt::services::modular_libvirt:        true
nova::migration::libvirt::modular_libvirt:                true
