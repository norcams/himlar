---
profile::base::network::nm_network_auto_bonding:
  trp:
    eth0:
      ethernet:
        'mtu': '9000' # the MTU size must be set also on the slave interfaces
    eth1:
      ethernet:
        'mtu': '9000'

# CPU Pinning (PCPU). This option replaces the deprecated nova::compute::vcpu_pin_set
# https://docs.openstack.org/nova/zed/configuration/config.html#compute.cpu_dedicated_set
nova::compute::cpu_dedicated_set:
  - '0-127'

