---
node_addr_public6: '2001:700:200:917::3f45'
network::interfaces_hash:
  eth0:
    ipv4:
      address1:   "%{hiera('netcfg_mgmt_netpart')}.45/%{hiera('netcfg_mgmt_cidr4')}"
      dns:        "%{hiera('netcfg_dns_mgmt_server1')};%{hiera('netcfg_dns_mgmt_server2')}"
      dns-search: "%{hiera('netcfg_dns_search_nm')}"
      method:     'manual'
  eth1:
    ipv4:
      address1:   "%{hiera('netcfg_trp_netpart')}.45/%{hiera('netcfg_trp_cidr4')}"
      gateway:    "%{hiera('netcfg_trp_gateway')}"
      dns:        "%{hiera('netcfg_dns_trp_server1')}"
      dns-search: "%{hiera('netcfg_dns_search_nm')}"
      method:     'manual'
    ipv6:
      method:         'manual'
      address1:       "%{hiera('netcfg_trp_netpart6')}::45/%{hiera('netcfg_trp_netmask6')}"
      route1:         "::/0,%{hiera('netcfg_trp_netpart6')}::701"
      route1_options: "src=%{hiera('node_addr_public6')}"
  lo-static:
    interface_name:   'lo'
    connection_type:  'loopback'
    ipv4:
      method:         'manual'
      address1:       "%{hiera('public__ip__resolver')}/32"
    ipv6:
      method:         'manual'
      address1:       "%{hiera('public__ipv6__resolver')}/128"
      address2:       "%{hiera('node_addr_public6')}/128"

# delete when every resolvers is on el9
named_interfaces::config:
  mgmt:
    - eth0
  trp:
    - eth1
  public:
    - lo
