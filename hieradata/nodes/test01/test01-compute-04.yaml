---
profile::base::lvm::physical_volume:
  '/dev/sda3':
    ensure: present
    force:  true
profile::base::lvm::volume_group:
  'vg_ext':
    physical_volumes:
      - /dev/sda3
profile::base::lvm::logical_volume:
  'lv_instances':
    volume_group: 'vg_ext'
    fs_type:      "xfs"
    mountpath:    "/var/lib/nova/instances"

#FIXME:el9 move to common after all computes are el9 with zed
openstack_version: "zed"
named_interfaces::config:
  mgmt:
    - p1p1
  trp:
    - bond0
  live:
    - bond0.120

# Trond libvirt test
profile::openstack::compute::hypervisor::modular_libvirt: true
profile::virtualization::libvirt::moduler_daemons:        true

nova::compute::libvirt::manage_libvirt_services:          false
nova::compute::libvirt::modular_libvirt:                  true
nova::compute::libvirt::services::modular_libvirt:        true

libvirt::service::modular_services:
  virtproxyd-tcp.socket:
    ensure: 'running'
    enable: true
