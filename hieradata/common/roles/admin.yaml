---
include:
  default:
    - profile::application::foreman
    - profile::bootstrap::repo
    - profile::network::services
    - profile::webserver::apache
    - profile::dns::rndc_key

profile::dns::rndc_key::create_admin_key:    true
profile::dns::rndc_key::create_mdns_key:     false
profile::dns::rndc_key::host_is_bind_server: false

foreman_version: '3.8'

# manage http files for ztp
profile::bootstrap::repo::manage_repo:      true

# sensu
sensu::agent::subscriptions:
  - 'base'
  - 'nodes'
  - 'metrics'

sensu::agent::annotations:
  'disk_warning': '90'
  'disk_critical': '95'

# FIXME:sensu-go
profile::monitoring::sensu::agent::enable_go_agent:   true
profile::monitoring::sensu::agent::enable_agent:      false

profile::base::common::packages:
  'bash-completion': {}
  'bash-completion-extras': {}
  'python3.11-requests': {} # needed for ansible-forman
  'python3.11-pyyaml': {} # needed for ansible-foreman
  'ruby':
    ensure: '2.7'
    provider: 'dnfmodule'
    enable_only: true
  #  'foreman':
    #  ensure: "%{::os_platform}%{os_version}"
    #provider: 'dnfmodule'
    #enable_only: true
  'toml-rb':
    ensure: present
    provider: 'puppetserver_gem'

apache::mod::passenger::manage_repo: false

profile::application::foreman::manage_eyaml:    false
profile::application::foreman::manage_firewall: true
profile::application::foreman::manage_repo_dir: true
profile::application::foreman::manage_r10k:     false
profile::application::foreman::push_facts:      true

profile::network::services::manage_dns_records: true

# We need SCL repos
openstack_extras::repo::redhat::redhat::purge_unmanaged:  false

puppet::server:                        true
puppet::server_foreman_url:            "https://%{hiera('mgmt__address__foreman')}"
puppet::dns_alt_names:
  - "puppet.%{hiera('domain_mgmt')}"
  - "puppetca.%{hiera('domain_mgmt')}"
  - "admin.%{hiera('domain_mgmt')}"

profile::webserver::apache::manage_firewall:  false
profile::webserver::apache::vhosts:
  'repo':
    servername:     "%{hiera('mgmt__address__repo')}"
    port:           80
    docroot:        '/opt/repo/public'
    docroot_owner:  'iaas'
  'repo-oobip':
    servername:     "%{hiera('oob__address__repo')}"
    port:           80
    docroot:        '/opt/repo/public'
    docroot_owner:  'iaas'

# Enable extra yum repo
profile::base::yumrepo::repo_hash:
  foreman:
    ensure: present
  foreman-plugins:
    ensure: present
  puppetlabs:
    ensure: absent
  puppetlabs7:
    ensure: present

# Enable gem installation
profile::base::common::manage_gems: true
profile::base::common::gems:
  'ipaddress': {}

# (Some) admin nodes are connected to oob net
named_interfaces::config:
  mgmt:
    - eth0
  oob:
    - eth1

dhcp::pools:
  "out-of-band network definition":
    network: "%{hiera('netcfg_oob_netpart')}.0"
    mask: "%{hiera('netcfg_oob_netmask')}"
    gateway: "%{hiera('netcfg_oob_gateway')}"
    options:
      # iDRAC will search for file in order <servicetag>-config.json, <model>-config.json, config.json
      # examples: 4U1BGM7-config.json, R740xd-config.json, config.json
      # Refer to the zero-touch, bare metal server provisioning document from Dell for options.
      # The config is checked into internal git on login:/opt/repo/public, then use 'sync-admin.sh'
      # (located in that location) to push the files over to the local admin node
      - vendor-class-identifier "iDRAC"
      - idrac-provision-url "-i %{hiera('oob__address__repo')} -s http -t 500 -n %{::location}/"
    parameters:
      - set vendor-string = option vendor-class-identifier
      - default-lease-time 43200
      - max-lease-time 86400
    nameservers:
      - "%{hiera('netcfg_oob_netpart')}.10"

# Default config: will not be merged and can be set per location if needed.
profile::application::foreman::dhcp_classes:
  onie_dell_s3048:
    parameters:
      - 'match if (substring(option vendor-class-identifier, 0, 29) = "onie_vendor:x86_64-dell_s3000")'
      - "option default-url = \"http://repo.mgmt.%{location}.uhdc.no/images/cumuluslinux/onie-installer-amd64\""
  onie_dell_s4048:
    parameters:
      - 'match if (substring(option vendor-class-identifier, 0, 29) = "onie_vendor:x86_64-dell_s4000")'
      - "option default-url = \"http://repo.mgmt.%{location}.uhdc.no/images/cumuluslinux/onie-installer-amd64\""
  onie_dell_s4148:
    parameters:
      - 'match if (substring(option vendor-class-identifier, 0, 32) = "onie_vendor:x86_64-dellemc_s4100")'
      - "option default-url = \"http://repo.mgmt.%{location}.uhdc.no/images/cumuluslinux/onie-installer-amd64\""
  onie_dell_s4810:
    parameters:
      - 'match if (substring(option vendor-class-identifier, 0, 19) = "onie_vendor:powerpc")'
      - "option default-url = \"http://repo.mgmt.%{location}.uhdc.no/images/cumuluslinux/onie-installer-powerpc\""
  onie_edgecore_as7726:
    parameters:
      - 'match if (substring(option vendor-class-identifier, 0, 39) = "onie_vendor:x86_64-accton_as7726_32x-r0")'
      - "option default-url = \"http://repo.mgmt.%{location}.uhdc.no/images/cumuluslinux/onie-installer-amd64\""
  onie_edgecore_as4610:
    parameters:
      - 'match if (substring(option vendor-class-identifier, 0, 35) = "onie_vendor:arm-accton_as4610_54-r0")'
      - "option default-url = \"http://repo.mgmt.%{location}.uhdc.no/images/cumuluslinux/onie-installer-arm\""
  onie_dell_s5232f:
    parameters:
      - 'match if (substring(option vendor-class-identifier, 0, 33) = "onie_vendor:x86_64-dellemc_s5232f")'
      - "option default-url = \"http://repo.mgmt.%{location}.uhdc.no/images/cumuluslinux/onie-installer-amd64\""
  onie_celestica_ds1000:
    parameters:
      - 'match if (substring(option vendor-class-identifier, 0, 32) = "onie_vendor:x86_64-cel_ds1000-r0")'
      - "option default-url = \"http://%{hiera('mgmt__address__repo')}/images/sonic/sonic-broadcom-mgmt.bin\""
  cumulus_s4810:
    parameters:
      - 'match if (substring(option host-name,0,7) = "cumulus")'
      - "option cumulus-provision-url \"http://repo.mgmt.%{location}.uhdc.no/provision/switch.sh\""
  opx_provision_vagrant:
    parameters:
      - 'match if (substring(option host-name,0,3) = "opx")'
      - "option ztd-provision-url \"http://repo.mgmt.%{location}.uhdc.no/provision/switch.sh\""
  opx_provision:
    parameters:
      - 'match if (substring(option host-name,0,3) = "OPX")'
      - "option ztd-provision-url \"http://repo.mgmt.%{location}.uhdc.no/provision/switch.sh\""
  sonic_provision:
    parameters:
      - 'match if (substring(option host-name,0,5) = "sonic")'
      - "option ztp_json_url \"http://%{hiera('mgmt__address__repo')}/provision/sonic_ztp.json\""

profile::bootstrap::repo::provision_files:
  - provision/sonic.sh

profile::bootstrap::repo::ztp_json:
  provision/sonic_ztp.json:
    tasks:
      provisioning-script:
        plugin:
          url: "http://%{hiera('mgmt__address__repo')}/provision/sonic.sh"
        reboot-on-success: 'false'
