---
#FIXME:el9 move to common after all computes are el9 with zed
openstack_version: "zed"

named_interfaces::config:
  mgmt:
  - p2049p1
  trp:
  - bond0
  live:
  - bond0.120

profile::base::network::nm_network_auto_bonding:
  trp:
    eth0:
      ethernet:
        'mtu': '9000' # the MTU size must be set also on the slave interfaces
    eth2:
      ethernet:
        'mtu': '9000'

# Turn off nested virtualization
profile::virtualization::nested::manage: false

profile::base::common::packages:
  'numactl': {}

# Enable static hugepages to prevent OOM-killer when using NUMA
profile::base::physical::enable_hugepages: true
# Number and size of hugepages, based on 512GB - 32 GB (4GB free pr node)
profile::base::physical::hugepagesz:       '2M'
profile::base::physical::hugepages:        '245760'

# Nova overrides
#| CERN Compute Load | Physical CPU   | Architecture            | Optimal Model               |
#|-------------------|----------------|-------------------------|-----------------------------|
#| ATLAS1            | AMD EPYC 7551  | Naples (Zen 1, 1st Gen) | EPYC or EPYC-v5             |
#| ATLAS2            | AMD EPYC 7552  | Rome (Zen 2, 2nd Gen)   | EPYC-Rome or EPYC-Rome-v5   |
#| ATLAS3            | AMD EPYC 9654P | Genoa (Zen 4, 4th Gen)  | EPYC-Genoa or EPYC-Genoa-v2 |
nova::compute::libvirt::cpu_models: ['EPYC']
nova::cpu_allocation_ratio:         '1'
nova::disk_allocation_ratio:        '1'
nova::ram_allocation_ratio:         '1'

# Create and enable more swap
profile::base::common::extraswap:        true
profile::base::common::extraswap_sizegb: 10

profile::base::lvm::physical_volume:
  '/dev/sda4':
    ensure: present
    force:  true
profile::base::lvm::volume_group:
  'vg_ext':
    physical_volumes:
      - /dev/sda4
profile::base::lvm::logical_volume:
  'lv_instances':
    volume_group: 'vg_ext'
    fs_type:      "xfs"
    mountpath:    "/var/lib/nova/instances"

# This compute host uses local storage for instances
nova::compute::rbd::ephemeral_storage:  false
nova::compute::libvirt::images_type: 'default'

# Configuration items not explicitly supported by the Puppet module
nova::config::nova_config:
  DEFAULT/metadata_workers:
    value: '2'

# Sensu
sensu::agent::annotations:
  'disk_warning': '90'
  'disk_critical': '95'
  'cpu_warning': '99'
  'cpu_critical': '100'
