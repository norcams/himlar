---
# This compute host uses local storage for instances
nova::compute::rbd::ephemeral_storage:            false

# Configuration items not explicitly supported by the Puppet module
nova::config::nova_config:
  DEFAULT/metadata_workers:
    value: '2'

nova::compute::libvirt::images_type: 'default'

profile::base::common::packages:
  'numactl': {}

# Nova overrides
nova::compute::libvirt::cpu_models: ['Haswell-noTSX-IBRS']
nova::cpu_allocation_ratio:         '8'
nova::disk_allocation_ratio:        '2'
nova::ram_allocation_ratio:         '1.2'

# do not use uefi on test01-compute-shpc
profile::base::lvm::physical_volume:
  '/dev/sda3':
    ensure: present
    force:  true
profile::base::lvm::volume_group:
  'vg_ext':
    physical_volumes:
      - /dev/sda3
